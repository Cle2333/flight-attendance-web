# =============================================================================
#  application-config.yml
#  ★ 上线前要改的唯一地方 ★
# =============================================================================
#
#  规则：
#    - 标了 ⚠️ 的 key，**上线前必须改成生产值**
#    - 每个 key 都有注释：用途 / 默认值 / 生成方式 / 环境变量名
#    - 优先级：环境变量 > application-{profile}.yml > 本文件
#    - profile 专属配置（dialect、Flyway on/off 等）仍在各自 yml 里
#
#  三种部署姿势：
#    1. 直接改这个文件 + 提交 git（适合 1-2 台机器的小项目）
#    2. 环境变量覆盖（容器/K8s 推荐）：
#         export DB_PASSWORD=***
#         export JWT_SECRET=$(openssl rand -hex 32)
#         java -jar flight-attendance-server.jar --spring.profiles.active=prod
#    3. .env 文件 + docker-compose env_file
#
#  不要再翻 application.yml / application-{dev,prod,test,h2}.yml，
#  那些文件只放"profile 之间的硬差异"。
# =============================================================================

server:
  # HTTP 端口
  # 环境变量：SERVER_PORT
  port: 8080

# -----------------------------------------------------------------------------
# 数据库（⚠️ 上线前必改 password）
# -----------------------------------------------------------------------------
# 环境变量覆盖（任一即可）：
#   DB_URL / DB_USER / DB_PASSWORD
#   SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/flight_attendance?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8
    username: flight
    password: flight       # ⚠️ 上线必改（≥ 16 字符随机）

# -----------------------------------------------------------------------------
# 应用配置（JWT / CORS / Admin bootstrap）
# -----------------------------------------------------------------------------
# 启动时如果 app.jwt.secret 是 dev 默认值或 < 32 字节，**直接抛异常拒启动**。
app:
  jwt:
    # 拿到 secret = 拿到伪造任意用户 token 的能力
    # 生成（任一）：
    #   openssl rand -hex 32
    #   openssl rand -base64 48
    #   head -c 48 /dev/urandom | base64
    # HS256 要求：≥ 256 bit (32 字节 / 64 hex 字符 / 44 base64 字符)
    # 环境变量：JWT_SECRET
    secret: "dev-secret-key-please-change-this-in-production-it-must-be-at-least-32-chars-long-for-hs256"   # ⚠️ 上线必改
    # Access token 有效期（分钟）。15 = 15 分钟。短一点更安全，靠 refresh token 续命。
    # 环境变量：APP_JWT_ACCESSEXPIRATIONMINUTES
    access-expiration-minutes: 15
    # Refresh token 有效期（天）。7 = 7 天。
    # 环境变量：APP_JWT_REFRESHEXPIRATIONDAYS
    refresh-expiration-days: 7

  # CORS 白名单 —— 只有 Flutter web 构建（跑在浏览器里）才会查这个。
  # 移动 App / Linux / Windows 客户端不走 CORS，配什么都能调。
  # 如果以后要发布 web 版，把这里改成你 web 部署的域名。
  # 留空 = 不允许任何跨域（最安全，但 web 版会报错）。
  cors:
    allowed-origins:
      - "*"   # 当前只有移动端 + 桌面端，无 CORS 风险；以后发 web 版再收紧

  # Admin 引导（⚠️ 上线后建议清空）
  # 配了此账号后，注册时如果 account 匹配，自动获得 ADMIN 角色。
  # 留空 = 没有自动 admin，需要手动 SQL 提升：
  #   UPDATE users SET role='ADMIN' WHERE account='xxx';
  # 环境变量：APP_ADMIN_BOOTSTRAPACCOUNT
  admin:
    bootstrap-account: ""   # 例如: "admin"
