spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

# 测试用 JWT secret —— 绕过启动检查（必须 ≥ 32 字节，且不含 dev/please）
app:
  jwt:
    secret: "test-secret-key-for-integration-tests-only-not-for-production-use-32chars"
    access-expiration-minutes: 15
    refresh-expiration-days: 7
  cors:
    allowed-origins:
      - "http://localhost"
