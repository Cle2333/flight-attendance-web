name: Build & Release

# 只在推 tag（v* 开头，例 v1.0.0）时触发 —— 完整构建 + 发 GitHub Release
# 不在 push 到 master/main 或 PR 时跑
on:
  push:
    tags: ['v*']

# 同一次 tag push 不重复跑（前一次还在跑就取消）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # release job 需要写 release/tag

jobs:
  # ============== Server (Spring Boot) ==============
  server:
    name: Server (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17']
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build & test
        working-directory: server
        run: mvn -B verify

      - name: Package JAR
        working-directory: server
        run: mvn -B -DskipTests package

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/target/flight-attendance-server.jar
          if-no-files-found: error
          retention-days: 30

  # ============== App (Flutter Android) ==============
  analyze:
    name: App · analyze & test
    runs-on: ubuntu-latest
    needs: [server]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

  build-apk:
    name: App · build APK
    needs: [analyze]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Decode release keystore (if provided)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/android/app/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > app/android/app/keystore/release.jks
          cat > app/android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore/release.jks
          EOF

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload mapping (for crash deobfuscation)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-mapping
          path: app/build/app/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore
          retention-days: 90

  # ============== Release (仅 tag 触发) ==============
  release:
    name: GitHub Release
    needs: [server, build-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download server JAR
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: dist/server

      - name: Download app APK
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: dist/app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag 名就是 release 名（去掉 refs/tags/ 前缀）
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/server/flight-attendance-server.jar
            dist/app/app-release.apk
